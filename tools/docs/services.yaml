# Registry of services whose Supported Actions tables are auto-generated.
#
# The action LIST comes from handler source (mode: switch|rest); the Description
# column is hand-written and PRESERVED across regen, keyed by action name.
# Per-service overrides: rename_actions (method->canonical), exclude_actions.
#
# Phase 1 covers single-table switch-mode services. REST controllers, multi-table
# docs, mixed-mode (ses), S3 query-string dispatch, and non-tabular docs are tracked
# as follow-ups; their switch handlers are acknowledged in deferred_handlers below so
# the new-service sentinel only fires on genuinely unregistered handlers.

services:
  - service: acm
    doc: docs/services/acm.md
    sources:
      - { path: src/main/java/io/github/hectorvent/floci/services/acm/AcmJsonHandler.java, mode: switch }
  - service: athena
    doc: docs/services/athena.md
    sources:
