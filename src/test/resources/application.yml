quarkus:
  http:
    port: 0
    test-port: 0
    limits:
      max-body-size: ${floci.max-request-size}M
  datasource:
    active: false

floci:
  base-url: "http://localhost:4566"
  default-region: us-east-1
  default-account-id: "000000000000"
  storage:
    mode: memory
    persistent-path: ./target/test-data
    prune-volumes-on-delete: true
    wal:
      compaction-interval-ms: 60000
    services:
      ssm:
        flush-interval-ms: 60000
      dynamodb:
        flush-interval-ms: 60000
      sns:
        flush-interval-ms: 60000
      lambda:
        flush-interval-ms: 60000
      cloudwatchlogs:
        flush-interval-ms: 60000
      cloudwatchmetrics:
        flush-interval-ms: 60000
      secretsmanager:
        flush-interval-ms: 60000
      acm:
        flush-interval-ms: 60000
      opensearch:
        flush-interval-ms: 60000
      batch:
        flush-interval-ms: 60000
      codepipeline:
        flush-interval-ms: 60000
      s3vectors:
        flush-interval-ms: 60000
      ecs:
        flush-interval-ms: 60000
      codebuild:
        flush-interval-ms: 60000
      config:
        flush-interval-ms: 60000
      transcribe:
        flush-interval-ms: 60000
      codedeploy:
        flush-interval-ms: 60000
      tagging:
        flush-interval-ms: 60000
      elasticbeanstalk:
        flush-interval-ms: 60000
      cloudfront:

  auth:
    validate-signatures: false
    presign-secret: test-secret

  security:
    disable-cors-headers: false

  init-hooks:
    shell-executable: /bin/sh
    timeout-seconds: 5
    shutdown-grace-period-seconds: 2

  tls:
    enabled: false
    self-signed: true

  protocols:
    strict-claiming: false

  docker:
    log-max-size: "10m"
    log-max-file: "3"
    resource-namespace: ""

  services:
    ssm:
      enabled: true
      max-parameter-history: 5
    sqs:
      enabled: true
      default-visibility-timeout: 30
      max-message-size: 1048576
    s3:
      enabled: true
      default-presign-expiry-seconds: 3600
    dynamodb:
      enabled: true
    sns:
      enabled: true
    lambda:
      enabled: true
      # aws-config-path:
      hot-reload:
        enabled: true
    apigateway:
      enabled: true
    apigatewayv2:
      enabled: true
    iam:
      enabled: true
      enforcement-enabled: false
      seed-deployer-principal: false
    msk:
      enabled: true
      mock: true
      default-image: "redpandadata/redpanda:latest"
    amazonmq:
      enabled: true
      mock: true
    elasticache:
      enabled: true
      proxy-base-port: 6379
      proxy-max-port: 6399
      default-image: "valkey/valkey:8"
      default-memcached-image: "memcached:1.6"
    memorydb:
      enabled: true
      mock: false
      proxy-base-port: 6400
      proxy-max-port: 6419
      default-image: "valkey/valkey:8"
    rds:
      enabled: true
      mock: false
      proxy-base-port: 7001
      proxy-max-port: 7099
      default-postgres-image: "postgres:16-alpine"
      default-mysql-image: "mysql:8.0"
      default-mariadb-image: "mariadb:11"
    rds-data:
      enabled: true
      transaction-ttl-seconds: 180
    neptune:
      enabled: true
      proxy-base-port: 8182
      proxy-max-port: 8282
      default-image: "tinkerpop/gremlin-server:3.7.3"
    eventbridge:
      enabled: true
    cloudmap:
      enabled: true
    emr:
      enabled: true
    wafv2:
      enabled: true
    scheduler:
      enabled: true
    cloudwatchlogs:
      enabled: true
      max-events-per-query: 10000
    cloudwatchmetrics:
      enabled: true
    secretsmanager:
      enabled: true
      default-recovery-window-days: 30
    kinesis:
      enabled: true
    firehose:
      enabled: true
    kms:
      enabled: true
    cognito:
      enabled: true
    stepfunctions:
      enabled: true
    cloudformation:
      enabled: true
    acm:
      enabled: true
      validation-wait-seconds: 0
    athena:
      enabled: true
      mock: true
    glue:
      enabled: true
    ses:
      enabled: true
    opensearch:
      enabled: true
      mock: true
      proxy-base-port: 9400
      proxy-max-port: 9499
    ec2:
      enabled: true
      imds-port: 9169
      ssh-port-range-start: 2200
      ssh-port-range-end: 2299
      publish-security-group-ports: true
      app-port-range-start: 30000
      app-port-range-end: 30999
      max-published-ports-per-instance: 20
      socat-image: alpine/socat
      mock: true
    ecs:
      enabled: true
      mock: true
    appconfig:
      enabled: true
    appconfigdata:
      enabled: true
    ecr:
      enabled: true
    ui:
      enabled: true
    bedrock-runtime:
      enabled: true
    eks:
      enabled: true
      mock: true
      ecr-registry-mirror: true
    pipes:
      enabled: true
    elbv2:
      enabled: true
      mock: true
    codebuild:
      enabled: true
      # docker-network: floci-network
    batch:
      enabled: true
      runner-mode: immediate
    codedeploy:
      enabled: true
    codepipeline:
      enabled: true
    autoscaling:
      enabled: true
    elasticbeanstalk:
      enabled: true
    transfer:
      enabled: true
    backup:
      enabled: true
      job-completion-delay-seconds: 1
    route53:
      enabled: true
    textract:
      enabled: true
    pricing:
      enabled: true
    ce:
      enabled: true
    cur:
      enabled: true
      emit-mode: off
    bcm-data-exports:
      enabled: true
      emit-mode: off
    cloudtrail:
      enabled: true
    cloudcontrol:
      enabled: true
    cloudfront:
      enabled: true
    appsync:
      enabled: true
    s3vectors:
      enabled: true
    iot:
      enabled: true
      mqtt:
        enabled: true
        auto-start: false
        host: 127.0.0.1
        port: 1883
    iotdata:
      enabled: true
